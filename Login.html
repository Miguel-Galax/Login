<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <meta charset="UTF-8">
    <style>
  .borda-texto {
    border: 2px solid #333; /* Espessura, Estilo, Cor */
    padding: 10px;          /* Espaço interno */
    border-radius: 5px;     /* Cantos arredondados */
    display: inline-block;  /* Ajusta a borda ao texto */
  }
</style>
</head>
<body>
<center><form class="borda-texto" action="qualquer coisa.html">
    <h1>
        Login
    </h1>
    <br>
    
    <label for="fname">Nome</label><br>
    <input type="text" id="fname" name="fname" required><br>

    <label for="fsenha">Senha</label><br>
    <input type="password" id="fsenha" name="fsenha" required><br>

    <label for="ftele">Telefone</label><br>
    <input type="tel" id="ftele" name="ftele" required><br>

    <label for="femail">Email</label><br>
    <input type="email" id="femail" name="femail" required><br>

    <input type="submit" value="Enviar">
</form></center>
</body>
</html>
